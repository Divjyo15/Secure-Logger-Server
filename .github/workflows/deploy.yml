name: Deploy to Hugging Face
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0        # ← Ye Add Karo!

      - name: Deploy to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git remote add hf https://Divjyo15:$HF_TOKEN@huggingface.co/spaces/divya67/secure-logger-server
          git push hf main --force
